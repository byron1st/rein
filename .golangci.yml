version: "2"
linters:
  settings:
    staticcheck:
      dot-import-whitelist:
        - "github.com/onsi/ginkgo/v2"
        - "github.com/onsi/gomega"
        - "github.com/mmcloughlin/avo/build"
        - "github.com/mmcloughlin/avo/operand"
        - "github.com/mmcloughlin/avo/reg"
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-ST1016"
        - "-ST1020"
        - "-ST1021"
        - "-ST1022"
        - "-QF1008"
